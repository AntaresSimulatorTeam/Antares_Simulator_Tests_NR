# Small test case with one node
#### 1 one electric node :  3 thermal clusters (2 legacy, one nuclear GEMS), 1 load (legacy), 1 wind (legacy), 1 short term storage (GEMS), 1 demand-side response (GEMS)

system:
  id: system
  components:

    - id: storage_west
      
      model: antares-historic-weo.short-term-storage
      parameters:
        - id: reservoir_capacity
          time-dependent: false
          scenario-dependent: false
          value: 7000
        - id: injection_nominal_capacity
          time-dependent: false
          scenario-dependent: false
          value: 700
        - id: withdrawal_nominal_capacity
          time-dependent: false
          scenario-dependent: false
          value: 700
        - id: efficiency_injection
          time-dependent: false
          scenario-dependent: false
          value: 0.85
        - id: efficiency_withdrawal
          time-dependent: false
          scenario-dependent: false
          value: 1
        - id: lower_rule_curve
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: upper_rule_curve
          time-dependent: false
          scenario-dependent: false
          value: 1.0
        - id: p_max_injection_modulation  # Read in p_max_injection
          time-dependent: false
          scenario-dependent: false
          value: 1.0
        - id: p_max_withdrawal_modulation # Read in p_max_withdrawal
          time-dependent: false
          scenario-dependent: false
          value: 1.0
        - id: inflows
          time-dependent: false
          scenario-dependent: false
          value: 0.0
        - id: initial_level
          time-dependent: false
          scenario-dependent: false
          value: 0.5
        - id: p_t_cost    # small penalty on pumping and turbining 
          time-dependent: false
          scenario-dependent: false
          value: 2
        - id: nb_cycles_max
          time-dependent: false
          scenario-dependent: false
          value: 0
        - id: mccormick            # 1 to activate McCormick, 0 otherwise
          time-dependent: false
          scenario-dependent: false 
          value: 0
        - id: cycle_constraint   # 1 to activate cycle constraint, 0 otherwise
          time-dependent: false
          scenario-dependent: false 
          value: 0


    - id: enr_ecrete
      model: antares-historic-weo.enr
      parameters: 
        - id: generation_cost
          time-dependent: false 
          scenario-dependent: false 
          value: -20
        - id: wind_total
          time-dependent: true 
          scenario-dependent: true
          value: ts_wind_total
        - id: taux_non_ecretable # non curtailable wind power
          time-dependent: false 
          scenario-dependent: false 
          value: 0.9


    - id: nuc_west
      
      model: antares-historic-weo.thermal
      parameters:
        - id: p_min_cluster
          scenario-dependent: true
          time-dependent: true
          value: west_b_p_min_cluster
        - id: p_max_cluster # timeseries that takes outages into account
          scenario-dependent: true
          time-dependent: true
          value: west_b_p_max_cluster
        - id: p_min_unit
          scenario-dependent: false
          time-dependent: false
          value: 200
        - id: p_max_unit
          scenario-dependent: false
          time-dependent: false
          value: 1000
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
          value: 30
        - id: startup_cost
          scenario-dependent: false
          time-dependent: false
          value: 100000
        - id: fixed_cost
          scenario-dependent: false
          time-dependent: false
          value: 0
        - id: d_min_up
          scenario-dependent: false
          time-dependent: false
          value: 24
        - id: d_min_down
          scenario-dependent: false
          time-dependent: false
          value: 24
        - id: nb_units_min # Equals to ceil(p_min_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: true
          time-dependent: true
          value: west_b_nb_units_min
        - id: nb_units_max # Equals to ceil(p_max_cluster/p_max_unit), to be done in preprocessing
          scenario-dependent: true
          time-dependent: true
          value: west_b_nb_units_max
        - id: nb_units_max_variation_forward
          scenario-dependent: true
          time-dependent: true
          value: west_b_nb_units_max_variation_forward
        - id: nb_units_max_variation_backward
          scenario-dependent: true
          time-dependent: true
          value: west_b_nb_units_max_variation_backward
        


  area-connections:
    - component: enr_ecrete
      port: balance_port
      area: west
    - component: storage_west 
      port: balance_port
      area: west
    - component: nuc_west
      port: balance_port
      area: west





 
